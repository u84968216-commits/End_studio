<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Thumbnail Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --orange-glow: #ff3c00;
            --orange-dark: #cc3000;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Cinematic Orange Gradient Background */
        .bg-glow {
            position: fixed;
            top: 0;
            right: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 75% 40%, var(--orange-dark) 0%, rgba(255, 60, 0, 0.15) 40%, var(--bg-dark) 80%);
            z-index: -1;
            filter: blur(40px);
        }

        /* Abstract Blurred Shapes */
        .shape-1 {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vh;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }

        /* Main Container to fix zoom-out stretching */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: relative;
            z-index: 10;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--orange-glow);
        }

        .cta-btn {
            background: white;
            color: black !important;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
        }

        .cta-btn .arrow {
            background: var(--orange-glow);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.8rem;
        }

        /* Hero Section */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            min-height: 80vh;
            position: relative;
        }

        .hero-content {
            flex: 1;
            z-index: 2;
            animation: fadeIn 1.5s ease-out;
            max-width: 50%;
        }

        .greeting {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .hero h1 {
            font-size: clamp(4rem, 6vw, 6rem); /* Responsive typography */
            line-height: 1.1;
            font-weight: 800;
            margin-bottom: 3rem;
            letter-spacing: -2px;
        }

        .hero-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 2rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .stat-num {
            color: var(--orange-glow);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Hero Image & 3D Integration */
        .hero-image-container {
            flex: 1;
            position: relative;
            height: 80vh; /* Fixed height to prevent overflow */
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            max-width: 50%;
        }

        .hero-model {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            object-position: bottom right;
            z-index: 1;
            
            /* 3D Blending effect - fades the bottom into the background */
            -webkit-mask-image: linear-gradient(to top, transparent 0%, black 15%);
            mask-image: linear-gradient(to top, transparent 0%, black 15%);
            
            /* Advanced cinematic lighting shadows */
            filter: drop-shadow(-15px 15px 25px rgba(0, 0, 0, 0.9)) drop-shadow(0px -10px 40px rgba(255, 60, 0, 0.15));
            animation: float 6s ease-in-out infinite;
        }

        /* Gallery Showcase */
        .gallery-section {
            padding: 5rem 5%;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .thumb-card {
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.05);
            aspect-ratio: 16/9;
        }

        .thumb-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .thumb-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 60, 0, 0.3);
        }

        .thumb-card:hover img {
            transform: scale(1.05);
        }

        /* Footer / Contact Section */
        .footer {
            text-align: center;
            padding: 6rem 5% 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 2rem;
        }

        .footer p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer-ig {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s, text-shadow 0.3s, transform 0.3s;
            display: inline-block;
        }

        .footer-ig:hover {
            color: var(--orange-glow);
            text-shadow: 0 0 30px rgba(255, 60, 0, 0.6);
            transform: scale(1.05);
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(255, 60, 0, 0.2);
            animation: zoomIn 0.3s ease;
            object-fit: contain;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 101;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .hero {
                flex-direction: column;
                height: auto;
                text-align: center;
                padding-top: 2rem;
            }
            
            .hero-content {
                max-width: 100%;
                margin-bottom: 2rem;
            }
            
            .hero-stats {
                justify-content: center;
                border-top: none;
            }
            
            .hero-image-container {
                max-width: 100%;
                height: 50vh; /* Restricts height on mobile so it doesn't take over */
                justify-content: center;
                align-items: flex-end;
            }
            
            .hero-model {
                object-position: bottom center;
            }
            
            .nav-links a:not(.cta-btn) {
                display: none; 
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="shape-1"></div>

    <div class="container">
        
        <nav class="navbar">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/></svg>
            </div>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#gallery">Projects</a>
                <a href="https://instagram.com/Mr.ghosh_200a" target="_blank" class="cta-btn">Get in Touch <span class="arrow">↗</span></a>
            </div>
        </nav>

        <header class="hero">
            <div class="hero-content">
                <p class="greeting">Hey, I'm a</p>
                <h1>Thumbnail<br>Designer</h1>
                
                <div class="hero-stats">
                    <div class="stat">
                        <span class="stat-num">#01</span>
                        <span class="stat-label">Product Design</span>
                    </div>
                    <div class="stat">
                        <span class="stat-num">#02</span>
                        <span class="stat-label">Packaging Design</span>
                    </div>
                    <div class="stat">
                        <span class="stat-num">#03</span>
                        <span class="stat-label">Photo & Film</span>
                    </div>
                    <div class="stat">
                        <span class="stat-num">#04</span>
                        <span class="stat-label">Creative Direction</span>
                    </div>
                </div>
            </div>

            <div class="hero-image-container">
                <img src="hero-model.png" alt="Thumbnail Designer" class="hero-model">
            </div>
        </header>

        <section id="gallery" class="gallery-section">
            <div class="gallery-grid">
                <div class="thumb-card" onclick="openModal('thumb-1.jpg')">
                    <img src="thumb-1.jpg" alt="Thumbnail Project 1">
                </div>
                <div class="thumb-card" onclick="openModal('thumb-2.jpg')">
                    <img src="thumb-2.jpg" alt="Thumbnail Project 2">
                </div>
                <div class="thumb-card" onclick="openModal('thumb-3.jpg')">
                    <img src="thumb-3.jpg" alt="Thumbnail Project 3">
                </div>
                <div class="thumb-card" onclick="openModal('thumb-4.jpg')">
                    <img src="thumb-4.jpg" alt="Thumbnail Project 4">
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>Ready to level up your thumbnails?</p>
            <a href="https://instagram.com/Mr.ghosh_200a" target="_blank" class="footer-ig">@Mr.ghosh_200a</a>
        </footer>

    </div>

    <div id="modal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modal-img">
    </div>

    <script>
        function openModal(imageSrc) {
            const modal = document.getElementById("modal");
            const modalImg = document.getElementById("modal-img");
            modal.style.display = "flex";
            modalImg.src = imageSrc;
            document.body.style.overflow = "hidden"; // Prevent scrolling
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
            document.body.style.overflow = "auto";
        }

        // Close modal when clicking outside the image
        document.getElementById("modal").addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
